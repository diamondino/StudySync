name: Cross-Platform Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Qt6
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.0'
        modules: 'qtbase'

    - name: Install Dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libboost-all-dev libgl1-mesa-dev

    - name: Install Boost (macOS)
      if: runner.os == 'macOS'
      run: brew install boost

    - name: Install Boost (Windows)
      if: runner.os == 'Windows'
      uses: MarkusJx/install-boost@v2.4.5
      id: install-boost
      with:
        boost_version: 1.83.0
        platform_version: 2022

    - name: Set Boost Environment (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: echo "BOOST_ROOT=${{ steps.install-boost.outputs.BOOST_ROOT }}" >> $GITHUB_ENV

    - name: Configure CMake
      run: cmake -B build

    - name: Build
      run: cmake --build build

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: StudyPlanner-${{ matrix.os }}
        path: |
          build/StudyPlanner
          build/StudyPlanner.exe
          build/Debug/StudyPlanner.exe
        retention-days: 7
