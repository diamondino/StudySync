name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get-version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.extract.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from CMakeLists.txt
        id: extract
        run: |
          VERSION=$(grep -oP '(?<=VERSION\s)[0-9.]+' CMakeLists.txt | head -n 1)
          echo "Found version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.os_name }} (${{ matrix.arch }})
    needs: get-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux (Ubuntu 24.04 gives Qt 6.6.2 natively) ---
          - runner: ubuntu-24.04
            os_name: linux
            arch: amd64
            cmake_args: ""
            ext: ""
          - runner: ubuntu-24.04-arm
            os_name: linux
            arch: arm64
            cmake_args: ""
            ext: ""
            
          # --- macOS (Apple Silicon only; Intel runners are deprecated) ---
          - runner: macos-latest
            os_name: macos
            arch: arm64
            cmake_args: ""
            ext: ""
            
          # --- Windows (x64) ---
          - runner: windows-latest
            os_name: windows
            arch: amd64
            cmake_args: "-A x64"
            ext: ".exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # DEPENDENCY INSTALLATION
      # ---------------------------------------------------------

      - name: Install Qt and Boost (Linux)
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev libboost-all-dev

      - name: Install Qt and Boost (macOS)
        if: matrix.os_name == 'macos'
        run: |
          brew install qt@6 boost
          brew link --force qt@6

      - name: Setup Python (Fixes Windows Python App Alias bug)
        if: matrix.os_name == 'windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Qt (Windows)
        if: matrix.os_name == 'windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          arch: 'win64_msvc2022_64'

      # (Windows Boost is natively pre-installed on the runner, no action needed!)

      # ---------------------------------------------------------
      # BUILD AND STAGE
      # ---------------------------------------------------------

      - name: Configure CMake
        shell: bash
        run: |
          if [ "${{ matrix.os_name }}" == "windows" ]; then
            # Bypasses the 618 download error by using the natively pre-installed GitHub Boost
            cmake -B build -S . ${{ matrix.cmake_args }} -DCMAKE_BUILD_TYPE=Release -DBOOST_ROOT="$BOOST_ROOT_1_83_0"
          else
            cmake -B build -S . ${{ matrix.cmake_args }} -DCMAKE_BUILD_TYPE=Release
          fi

      - name: Build
        run: cmake --build build --config Release

      - name: Stage binaries
        shell: bash
        run: |
          mkdir -p staging
          
          # Updated to match the "studysync_" prefixes output by CMake
          if [ -f "build/server/Release/studysync_server${{ matrix.ext }}" ]; then
            cp "build/server/Release/studysync_server${{ matrix.ext }}" "staging/studysync_server-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}"
            cp "build/client/Release/studysync_client${{ matrix.ext }}" "staging/studysync_client-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}"
          elif [ -f "build/server/studysync_server${{ matrix.ext }}" ]; then
            cp "build/server/studysync_server${{ matrix.ext }}" "staging/studysync_server-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}"
            cp "build/client/studysync_client${{ matrix.ext }}" "staging/studysync_client-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}"
          else
            echo "Error: Could not locate built binaries!"
            exit 1
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os_name }}-${{ matrix.arch }}
          path: staging/*
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [get-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binaries-*
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get-version.outputs.VERSION }}
          name: Release v${{ needs.get-version.outputs.VERSION }}
          files: artifacts/*
          generate_release_notes: true
